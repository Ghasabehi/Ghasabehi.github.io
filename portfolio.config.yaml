# ── About ──────────────────────────────────────────────────────────────
about: |
  Ph.D. in Mechanical Engineering specializing in PEM fuel cell modeling, optimization, and AI-driven performance enhancement. Extensive expertise in analytical, CFD, and data-driven modeling of transport phenomena, interface behavior, and degradation mechanisms. First-author of multiple Q1 journal articles and co-author of an Elsevier book on AI-based fuel cell optimization (2025). My research tackles performance bottlenecks in hydrogen technologies—a key emerging low-carbon solution highlighted in this position—directly supporting their viability for large-scale renewable energy storage and integration into future decarbonized energy systems.

