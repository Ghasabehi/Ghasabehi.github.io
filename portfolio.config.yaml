# ── About ──────────────────────────────────────────────────────────────
about: |
  I am a Postdoctoral Researcher at KN Toosi University of Technology, specializing in PEM fuel cell modeling, AI-driven optimization, and multi-physics simulation. My work bridges fundamental transport phenomena with data-driven surrogate modeling to enhance fuel cell performance and durability. With multiple Q1 publications and an upcoming Elsevier book on AI-based energy optimization, I bring a strong track record in both theoretical analysis and applied computational methods for clean energy systems.

